<div class="custom-pagination">
    <div class="left-c">
      <span>Hiển thị mỗi trang</span>
      <select 
        [value]="rowsPerPage"
        (change)="changeRowsPerPage($event)"
        >
        <option *ngFor="let size of [25, 50, 75, 100]" [value]="size">
          {{ size }}
        </option>
      </select>
    </div>
    <div class="right-c">
      <button 
        (click)="handleFirst()" 
        [disabled]="currentPage === 1" 
        class="arrow-button first-last-button"
      >
        Đầu
      </button>
      <button 
        (click)="handlePrev()" 
        [disabled]="currentPage === 1" 
        class="arrow-button"
      >
        <img src="assets/left-chevron.png" alt="Trang Trước" />
      </button>
      <button
        *ngFor="let page of getPageNumbers(); let i = index"
        [ngClass]="{
          'ellipsis-button': page === 'left-ellipsis' || page === 'right-ellipsis',
          'page-button active': page === currentPage
        }"
        (click)="pageButtonClick(page)"
        [disabled]="page === 'left-ellipsis' || page === 'right-ellipsis'"
      >
        {{ page }}
      </button>
      <button 
        (click)="handleNext()" 
        [disabled]="currentPage === totalPages" 
        class="arrow-button"
      >
        <img src="assets/right-chevron.png" alt="Trang Tiếp Theo" />
      </button>
      <button 
        (click)="handleLast()" 
        [disabled]="currentPage === totalPages" 
        class="arrow-button first-last-button"
      >
        Cuối
      </button>
    </div>
  </div>
